<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="920" height="560" fill="#f7fafc"/>
  <text x="460" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a202c">Retail Sales Forecasting — Architecture</text>

  <!-- Raw data -->
  <rect x="40" y="80" width="200" height="120" rx="10" fill="#ffffff" stroke="#2b6cb0" stroke-width="2"/>
  <text x="140" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#2b6cb0">Raw data (4 CSVs)</text>
  <text x="140" y="134" text-anchor="middle" font-size="12" fill="#4a5568">Orders · Products</text>
  <text x="140" y="152" text-anchor="middle" font-size="12" fill="#4a5568">Customers · Location</text>
  <text x="140" y="178" text-anchor="middle" font-size="11" fill="#718096">~10k orders, 4 years</text>

  <!-- Pipeline -->
  <rect x="300" y="80" width="200" height="120" rx="10" fill="#ffffff" stroke="#2b6cb0" stroke-width="2"/>
  <text x="400" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#2b6cb0">data_pipeline.py</text>
  <text x="400" y="134" text-anchor="middle" font-size="12" fill="#4a5568">join · clean · aggregate</text>
  <text x="400" y="152" text-anchor="middle" font-size="12" fill="#4a5568">to weekly / monthly</text>
  <text x="400" y="178" text-anchor="middle" font-size="11" fill="#718096">total · category · subcat</text>

  <!-- Models -->
  <rect x="560" y="80" width="320" height="120" rx="10" fill="#ffffff" stroke="#dd6b20" stroke-width="2"/>
  <text x="720" y="108" text-anchor="middle" font-size="15" font-weight="700" fill="#dd6b20">train.py — two models</text>
  <text x="720" y="134" text-anchor="middle" font-size="12" fill="#4a5568">Prophet → total revenue</text>
  <text x="720" y="152" text-anchor="middle" font-size="12" fill="#4a5568">LightGBM → category &amp; subcategory</text>
  <text x="720" y="178" text-anchor="middle" font-size="11" fill="#718096">saved to models/*.pkl</text>

  <!-- Reconcile -->
  <rect x="300" y="250" width="200" height="100" rx="10" fill="#ffffff" stroke="#805ad5" stroke-width="2"/>
  <text x="400" y="282" text-anchor="middle" font-size="15" font-weight="700" fill="#805ad5">reconcile.py</text>
  <text x="400" y="306" text-anchor="middle" font-size="12" fill="#4a5568">MinT reconciliation</text>
  <text x="400" y="326" text-anchor="middle" font-size="11" fill="#718096">levels sum correctly</text>

  <!-- Forecast helper -->
  <rect x="560" y="250" width="320" height="100" rx="10" fill="#ffffff" stroke="#dd6b20" stroke-width="2"/>
  <text x="720" y="282" text-anchor="middle" font-size="15" font-weight="700" fill="#dd6b20">forecast.py</text>
  <text x="720" y="306" text-anchor="middle" font-size="12" fill="#4a5568">load models · predict ahead</text>
  <text x="720" y="326" text-anchor="middle" font-size="11" fill="#718096">+ discount what-if</text>

  <!-- Serving -->
  <rect x="220" y="420" width="220" height="100" rx="10" fill="#ebf8ff" stroke="#2b6cb0" stroke-width="2"/>
  <text x="330" y="452" text-anchor="middle" font-size="15" font-weight="700" fill="#2b6cb0">Gradio app</text>
  <text x="330" y="476" text-anchor="middle" font-size="12" fill="#4a5568">4 interactive tabs</text>
  <text x="330" y="496" text-anchor="middle" font-size="11" fill="#718096">charts · sliders · what-if</text>

  <rect x="480" y="420" width="220" height="100" rx="10" fill="#ebf8ff" stroke="#2b6cb0" stroke-width="2"/>
  <text x="590" y="452" text-anchor="middle" font-size="15" font-weight="700" fill="#2b6cb0">FastAPI</text>
  <text x="590" y="476" text-anchor="middle" font-size="12" fill="#4a5568">forecast endpoints</text>
  <text x="590" y="496" text-anchor="middle" font-size="11" fill="#718096">/docs Swagger UI</text>

  <!-- Arrows -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#718096"/>
    </marker>
  </defs>
  <line x1="240" y1="140" x2="296" y2="140" stroke="#718096" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="140" x2="556" y2="140" stroke="#718096" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="720" y1="200" x2="720" y2="246" stroke="#718096" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="560" y1="300" x2="504" y2="300" stroke="#718096" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="640" y1="350" x2="600" y2="416" stroke="#718096" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="600" y1="350" x2="360" y2="416" stroke="#718096" stroke-width="2" marker-end="url(#arr)"/>
</svg>
